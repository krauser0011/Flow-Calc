<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitraje Electrónico | Pro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --surface: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --success: #059669;
            --success-bg: #d1fae5;
            --danger: #dc2626;
            --danger-bg: #fee2e2;
            --warning: #d97706;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --surface: #1e293b;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border: #334155;
            --accent: #3b82f6;
            --accent-light: #1e3a8a;
            --success: #10b981;
            --success-bg: #064e3b;
            --danger: #ef4444;
            --danger-bg: #7f1d1d;
            --warning: #f59e0b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background-image: var(--bg-gradient);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background-color: var(--surface);
            border-radius: 24px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 440px;
            padding: 32px;
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-btn {
            background: var(--accent-light);
            border: none;
            color: var(--accent);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .theme-btn:hover {
            transform: scale(1.05);
        }

        .mode-toggle {
            display: flex;
            background-color: var(--bg-gradient);
            border-radius: 14px;
            padding: 6px;
            margin-bottom: 28px;
            border: 1px solid var(--border);
        }

        .mode-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .mode-btn.active {
            background-color: var(--surface);
            color: var(--text-primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .input-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .input-group {
            flex: 1;
            position: relative;
            background-color: var(--accent-light);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid transparent;
        }

        .input-group:focus-within {
            border-color: var(--accent);
            background-color: var(--surface);
        }

        label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 700;
        }

        label svg {
            width: 14px;
            height: 14px;
            opacity: 0.7;
        }

        input {
            width: 100%;
            background-color: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 600;
            outline: none;
        }

        input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .warning-msg {
            font-size: 0.8rem;
            color: var(--warning);
            margin-top: -12px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 4px;
        }

        .results {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-radius: 12px;
            background-color: var(--bg-gradient);
            border: 1px solid var(--border);
        }

        .result-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .result-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .total-box {
            margin-top: 12px;
            padding: 24px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--border);
            position: relative;
        }

        .total-box.profit { border-color: var(--success); background-color: var(--success-bg); }
        .total-box.loss { border-color: var(--danger); background-color: var(--danger-bg); }

        .total-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .total-value {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 4px;
        }

        .profit .total-value, .profit .total-label { color: var(--success); }
        .loss .total-value, .loss .total-label { color: var(--danger); }

        .copy-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            opacity: 0.5;
        }

        .copy-btn:hover { opacity: 1; }

    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                Arbitraje
            </h1>
            <button class="theme-btn" onclick="toggleTheme()" id="themeIcon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>

        <div class="mode-toggle">
            <button class="mode-btn active" id="btnWally" onclick="setMode('wally')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/></svg>
                Base: Wally
            </button>
            <button class="mode-btn" id="btnBinance" onclick="setMode('binance')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8M12 18V6"/></svg>
                Base: Binance
            </button>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    Tasa BDV
                </label>
                <input type="number" id="tasaBdv" placeholder="0.00" step="0.01">
            </div>
            <div class="input-group">
                <label>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Tasa P2P
                </label>
                <input type="number" id="tasaP2p" placeholder="0.00" step="0.01">
            </div>
        </div>
        
        <div class="warning-msg" id="alertaTasas">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Tasa P2P es menor a Tasa BDV
        </div>

        <div class="input-group" style="margin-bottom: 12px; border-radius: 20px;">
            <label id="labelMonto">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                Monto a operar ($)
            </label>
            <input type="number" id="montoPrincipal" placeholder="0.00" step="0.01">
        </div>

        <div class="results">
            <div class="result-row">
                <span class="result-label">Inversión (BDV)</span>
                <span class="result-value" id="resBdv">0.00 Bs</span>
            </div>
            <div class="result-row">
                <span class="result-label">Llega a Wally</span>
                <span class="result-value" id="resWally">0.00 $</span>
            </div>
            <div class="result-row">
                <span class="result-label">Recibes Binance</span>
                <span class="result-value" id="resBinance">0.0000 USDT</span>
            </div>
            <div class="result-row">
                <span class="result-label">Retorno Bruto</span>
                <span class="result-value" id="resRetorno">0.00 Bs</span>
            </div>

            <div class="total-box" id="cajaTotal">
                <button class="copy-btn" onclick="copiarResultado()" title="Copiar ganancia">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
                <div class="total-label" id="labelNeto">Resultado Neto</div>
                <div class="total-value" id="resNeto">0.00</div>
                <div style="font-weight: 600; font-size: 1.1rem;" id="resPorcentaje">0.00%</div>
            </div>
        </div>
    </div>

    <script>
        let calcMode = 'wally';
        let gananciaActual = 0;

        // Cargar tasas guardadas si existen
        window.onload = () => {
            if(localStorage.getItem('tasaBdv')) document.getElementById('tasaBdv').value = localStorage.getItem('tasaBdv');
            if(localStorage.getItem('tasaP2p')) document.getElementById('tasaP2p').value = localStorage.getItem('tasaP2p');
            
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('themeIcon').innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
            }
            calcular();
        };

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
            }
        }

        function setMode(mode) {
            calcMode = mode;
            document.getElementById('btnWally').classList.remove('active');
            document.getElementById('btnBinance').classList.remove('active');
            
            if (mode === 'wally') {
                document.getElementById('btnWally').classList.add('active');
                document.getElementById('labelMonto').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Monto a recargar en Wally ($)';
            } else {
                document.getElementById('btnBinance').classList.add('active');
                document.getElementById('labelMonto').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8M12 18V6"/></svg> USDT deseados en Binance';
            }
            calcular();
        }

        function formatNumber(num, decimals = 2) {
            if (isNaN(num) || !isFinite(num)) return (0).toLocaleString('en-US', {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
            return num.toLocaleString('en-US', {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
        }

        function calcular() {
            const tasaBdv = parseFloat(document.getElementById('tasaBdv').value) || 0;
            const tasaP2p = parseFloat(document.getElementById('tasaP2p').value) || 0;
            const monto = parseFloat(document.getElementById('montoPrincipal').value) || 0;

            // Guardar tasas en memoria local
            if (tasaBdv > 0) localStorage.setItem('tasaBdv', tasaBdv);
            if (tasaP2p > 0) localStorage.setItem('tasaP2p', tasaP2p);

            // Mostrar alerta si la lógica de tasas está invertida
            const alerta = document.getElementById('alertaTasas');
            if (tasaBdv > 0 && tasaP2p > 0 && tasaP2p < tasaBdv) {
                alerta.style.display = 'flex';
            } else {
                alerta.style.display = 'none';
            }

            const COMISION_BDV = 0.0625;
            const FACTOR_BINANCE = 0.935031;

            let wallyUsd = 0;
            let binanceUsdt = 0;

            if (monto > 0) {
                if (calcMode === 'wally') {
                    wallyUsd = monto;
                    binanceUsdt = wallyUsd * FACTOR_BINANCE;
                } else {
                    binanceUsdt = monto;
                    wallyUsd = binanceUsdt / FACTOR_BINANCE;
                }
            }

            const bdvUsd = wallyUsd * (1 + COMISION_BDV);
            const inversionVes = bdvUsd * tasaBdv;
            const retornoVes = binanceUsdt * tasaP2p;
            
            gananciaActual = retornoVes - inversionVes;
            const porcentajeRendimiento = inversionVes > 0 ? (gananciaActual / inversionVes) * 100 : 0;

            document.getElementById('resBdv').innerText = formatNumber(inversionVes) + ' Bs';
            document.getElementById('resWally').innerText = formatNumber(wallyUsd) + ' $';
            document.getElementById('resBinance').innerText = formatNumber(binanceUsdt, 4) + ' USDT';
            document.getElementById('resRetorno').innerText = formatNumber(retornoVes) + ' Bs';

            const cajaTotal = document.getElementById('cajaTotal');
            const netElement = document.getElementById('resNeto');
            const percentElement = document.getElementById('resPorcentaje');
            const labelNeto = document.getElementById('labelNeto');
            
            let prefix = gananciaActual > 0 ? '+' : '';
            netElement.innerText = prefix + formatNumber(gananciaActual);
            percentElement.innerText = prefix + formatNumber(porcentajeRendimiento) + '%';

            cajaTotal.className = 'total-box';
            
            if (monto > 0 && tasaBdv > 0 && tasaP2p > 0) {
                if (gananciaActual > 0) {
                    cajaTotal.classList.add('profit');
                    labelNeto.innerText = 'Ganancia Neta (Bs)';
                } else if (gananciaActual < 0) {
                    cajaTotal.classList.add('loss');
                    labelNeto.innerText = 'Pérdida Neta (Bs)';
                }
            } else {
                labelNeto.innerText = 'Resultado Neto (Bs)';
            }
        }

        function copiarResultado() {
            if(gananciaActual === 0) return;
            navigator.clipboard.writeText(formatNumber(gananciaActual)).then(() => {
                const label = document.getElementById('labelNeto');
                const originalText = label.innerText;
                label.innerText = '¡Copiado!';
                setTimeout(() => { label.innerText = originalText; }, 1500);
            });
        }

        document.getElementById('tasaBdv').addEventListener('input', calcular);
        document.getElementById('tasaP2p').addEventListener('input', calcular);
        document.getElementById('montoPrincipal').addEventListener('input', calcular);
    </script>
</body>
</html>
