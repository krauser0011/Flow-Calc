<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlowCalc 6.5 | Flexible Edition</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f8fafc; --bg-card: #ffffff; --text-main: #0f172a;
            --accent-wally: #6366f1; --accent-bs: #10b981; --accent-bdv: #ef4444; 
            --accent-binance: #f59e0b; --border: #e2e8f0;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; padding: 10px; }
        .card { border-radius: 20px; border: 1px solid var(--border); background: var(--bg-card); margin-bottom: 10px; padding: 12px; }
        .header-section { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; padding: 15px; border-radius: 20px; margin-bottom: 12px; }
        .form-control { background-color: rgba(0,0,0,0.03); border: 2px solid var(--border); color: var(--text-main); border-radius: 12px; font-weight: 700; font-family: 'JetBrains+Mono', monospace; text-align: center; }
        .form-control:focus { border-color: var(--accent-wally); box-shadow: none; background: #fff; }
        .label-title { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section shadow text-center">
        <h4 class="fw-bold mb-0">📊 FlowCalc <span style="color: #6366f1;">6.5</span></h4>
        <small class="opacity-75">Control de Comisión Variable</small>
    </div>

    <div class="row g-2 mb-2">
        <div class="col-4">
            <div class="card p-2 text-center border-primary-subtle">
                <span class="label-title text-primary">% Comisión</span>
                <input type="number" id="fee_input" class="form-control form-control-sm" value="6.25" step="0.01" oninput="calcular('tasa')">
            </div>
        </div>
        <div class="col-4">
            <div class="card p-2 text-center">
                <span class="label-title">Tasa BCV</span>
                <input type="number" id="tasa_bcv" class="form-control form-control-sm" value="51.50" oninput="calcular('tasa')">
            </div>
        </div>
        <div class="col-4">
            <div class="card p-2 text-center">
                <span class="label-title">Venta P2P</span>
                <input type="number" id="tasa_p2p" class="form-control form-control-sm" value="62.50" oninput="calcular('tasa')">
            </div>
        </div>
    </div>

    <div class="card shadow-sm" style="border-left: 8px solid var(--accent-bs);">
        <span class="label-title text-success">Inversión en Bolívares (Bs)</span>
        <input type="number" id="monto_bs" class="form-control mb-3" placeholder="0.00" oninput="calcular('bs')">
        
        <div class="row g-2">
            <div class="col-6">
                <span class="label-title text-danger">Débito Banco ($)</span>
                <input type="number" id="debito_usd" class="form-control" oninput="calcular('banco')">
            </div>
            <div class="col-6">
                <span class="label-title text-primary">Neto Wally ($)</span>
                <input type="number" id="wally_neto" class="form-control" oninput="calcular('wally')">
            </div>
        </div>
    </div>

    <div class="card border-0 shadow mt-2" style="background: #1e293b; color: white;">
        <div class="row text-center">
            <div class="col-6 border-end border-secondary">
                <span class="label-title text-light opacity-50">Binance USDT</span>
                <h4 class="fw-bold mb-0" id="binance_usdt_text" style="color: var(--accent-binance);">0.00</h4>
            </div>
            <div class="col-6">
                <span class="label-title text-light opacity-50">Ganancia Neta</span>
                <h4 class="fw-bold mb-0 text-success" id="res_ganancia">0 Bs</h4>
            </div>
        </div>
    </div>

    <div class="row g-2 mt-2">
        <div class="col-8">
            <button class="btn btn-dark w-100 py-3 fw-bold" onclick="guardar()">💾 GUARDAR CIERRE</button>
        </div>
        <div class="col-4">
            <button class="btn btn-outline-secondary w-100 py-3 fw-bold" onclick="location.reload()">🔄 RESET</button>
        </div>
    </div>

    <div class="mt-4">
        <h6 class="fw-bold small d-flex justify-content-between">
            CIERRES DE HOY <span>Total: <b id="ganancia_total_dia" class="text-success">0 Bs</b></span>
        </h6>
        <div class="table-responsive card border-0 shadow-sm p-0">
            <table class="table table-sm text-center mb-0" style="font-size: 0.8rem;">
                <thead class="table-dark">
                    <tr><th>Hora</th><th>Inv. Bs</th><th>Gan. Bs</th></tr>
                </thead>
                <tbody id="lista_historial"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function calcular(origen) {
        const bcv = parseFloat(document.getElementById('tasa_bcv').value) || 0;
        const p2p = parseFloat(document.getElementById('tasa_p2p').value) || 0;
        const fee = (parseFloat(document.getElementById('fee_input').value) || 0) / 100;
        
        let bs = parseFloat(document.getElementById('monto_bs').value) || 0;
        let debito = parseFloat(document.getElementById('debito_usd').value) || 0;
        let wally = parseFloat(document.getElementById('wally_neto').value) || 0;

        if (origen === 'bs' || origen === 'tasa') {
            debito = bs / bcv;
            wally = debito / (1 + fee);
        } else if (origen === 'banco') {
            bs = debito * bcv;
            wally = debito / (1 + fee);
        } else if (origen === 'wally') {
            debito = wally * (1 + fee);
            bs = debito * bcv;
        }

        if(origen !== 'bs') document.getElementById('monto_bs').value = bs > 0 ? bs.toFixed(2) : "";
        if(origen !== 'banco') document.getElementById('debito_usd').value = debito > 0 ? debito.toFixed(2) : "";
        if(origen !== 'wally') document.getElementById('wally_neto').value = wally > 0 ? wally.toFixed(2) : "";

        const usdt = wally * 0.985; 
        const rBs = usdt * p2p;
        const gan = rBs - bs;

        document.getElementById('binance_usdt_text').innerText = usdt.toFixed(2);
        document.getElementById('res_ganancia').innerText = Math.floor(gan).toLocaleString('es-VE') + " Bs";
        document.getElementById('res_ganancia').style.color = gan >= 0 ? "#10b981" : "#ef4444";
    }

    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('focus', function() { setTimeout(() => { this.select(); }, 50); });
    });

    let operaciones = JSON.parse(localStorage.getItem('ops_v65')) || [];
    function guardar() {
        const inv = document.getElementById('monto_bs').value || "0";
        const gan = document.getElementById('res_ganancia').innerText;
        if(inv === "0") return;
        operaciones.unshift({ h: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), i: inv, g: gan });
        localStorage.setItem('ops_v65', JSON.stringify(operaciones));
        dibujarTabla();
    }

    function dibujarTabla() {
        const lista = document.getElementById('lista_historial');
        lista.innerHTML = '';
        let total = 0;
        operaciones.forEach(op => {
            total += parseInt(op.g.replace(/\./g, ''));
            lista.innerHTML += `<tr><td>${op.h}</td><td>${parseFloat(op.i).toLocaleString('es-VE')}</td><td class="fw-bold">${op.g}</td></tr>`;
        });
        document.getElementById('ganancia_total_dia').innerText = total.toLocaleString('es-VE') + " Bs";
    }

    dibujarTabla();
</script>
</body>
</html>
