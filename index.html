<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Arbitraje Pro</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1a1a1a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --input-bg: #f8fafc;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-sub: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
            --input-bg: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; transition: all 0.2s ease; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .main-card {
            background-color: var(--card);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 { font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text);
        }

        /* Grid de Entradas */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .field {
            background: var(--input-bg);
            padding: 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .field input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* El Flujo Visual */
        .flow-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .step {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: var(--input-bg);
            border-radius: 16px;
            border-left: 4px solid var(--primary);
        }

        .step-info span { display: block; }
        .step-label { font-size: 0.75rem; color: var(--text-sub); font-weight: 500; }
        .step-value { font-size: 1rem; font-weight: 700; }

        /* Resultado Final */
        .summary {
            margin-top: 20px;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            background: var(--primary);
            color: white;
        }

        .summary.profit { background: var(--success); }
        .summary.loss { background: var(--danger); }

        .summary-label { font-size: 0.8rem; font-weight: 600; opacity: 0.9; text-transform: uppercase; }
        .summary-value { font-size: 1.8rem; font-weight: 800; margin: 4px 0; }
        .summary-percent { font-size: 0.9rem; font-weight: 700; background: rgba(0,0,0,0.1); padding: 4px 12px; border-radius: 20px; display: inline-block; }

        .divider { height: 1px; background: var(--border); margin: 15px 0; }

    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h1>Arbitraje <span style="color:var(--primary)">Dual</span></h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="tBtn">🌙</button>
    </div>

    <div class="input-grid">
        <div class="field">
            <label>Tasa BDV (Bs)</label>
            <input type="number" id="tasaBdv" placeholder="0.00" step="0.01">
        </div>
        <div class="field">
            <label>Tasa P2P (Bs)</label>
            <input type="number" id="tasaP2p" placeholder="0.00" step="0.01">
        </div>
    </div>

    <div class="divider"></div>

    <div class="field" style="margin-bottom: 20px; border-left: 4px solid var(--primary);">
        <label>Base BDV: Bolívares Disponibles</label>
        <input type="number" id="montoBs" placeholder="Cantidad en Bolívares" step="0.01">
    </div>

    <div class="flow-container">
        <div class="step">
            <div class="step-info">
                <span class="step-label">1. USD Comprados en BDV</span>
                <span class="step-value" id="resUsdBdv">0.00 $</span>
            </div>
            <div style="font-size: 0.7rem; color: var(--text-sub);">Inversión Neta</div>
        </div>

        <div class="step" style="border-left-color: #00D1A1;">
            <div class="step-info">
                <span class="step-label">2. Recibido en Wally</span>
                <span class="step-value" id="resWally">0.00 $</span>
            </div>
            <div style="font-size: 0.7rem; color: var(--text-sub);">-6.25% Comis.</div>
        </div>

        <div class="step" style="border-left-color: #F3BA2F;">
            <div class="step-info">
                <span class="step-label">3. Recibido en Binance</span>
                <span class="step-value" id="resBinance">0.0000 USDT</span>
            </div>
            <div style="font-size: 0.7rem; color: var(--text-sub);">Ruta Final</div>
        </div>
    </div>

    <div class="summary" id="cajaNeto">
        <div class="summary-label" id="labelNeto">Retorno del Ciclo</div>
        <div class="summary-value" id="resNeto">0.00 Bs</div>
        <div class="summary-percent" id="resPorcentaje">0.00%</div>
    </div>
</div>

<script>
    const inputs = ['tasaBdv', 'tasaP2p', 'montoBs'];
    
    // Cargar datos previos
    inputs.forEach(id => {
        const saved = localStorage.getItem(id);
        if(saved) document.getElementById(id).value = saved;
        document.getElementById(id).addEventListener('input', calcular);
    });

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('tBtn');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            btn.innerText = '🌙';
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = '☀️';
        }
    }

    function format(num, dec = 2) {
        return num.toLocaleString('en-US', {minimumFractionDigits: dec, maximumFractionDigits: dec});
    }

    function calcular() {
        const tBdv = parseFloat(document.getElementById('tasaBdv').value) || 0;
        const tP2p = parseFloat(document.getElementById('tasaP2p').value) || 0;
        const mBs = parseFloat(document.getElementById('montoBs').value) || 0;

        // Guardar progreso
        inputs.forEach(id => localStorage.setItem(id, document.getElementById(id).value));

        const COMISION_FIX = 0.0625; // 6.25%
        const FACTOR_WALLY_BINANCE = 0.935031;

        // 1. ¿Cuántos USD compro en el banco con mis Bs?
        const usdBdv = tBdv > 0 ? mBs / tBdv : 0;

        // 2. ¿Cuánto llega a Wally? 
        // Lógica: Si el banco me quita 6.25% del total, recibo el resto
        const wallyUsd = usdBdv / (1 + COMISION_FIX);

        // 3. ¿Cuánto llega a Binance?
        const binanceUsdt = wallyUsd * FACTOR_WALLY_BINANCE;

        // 4. Retorno final al vender en P2P
        const retornoBs = binanceUsdt * tP2p;
        const netoBs = retornoBs - mBs;
        const porcentaje = mBs > 0 ? (netoBs / mBs) * 100 : 0;

        // Actualizar UI
        document.getElementById('resUsdBdv').innerText = format(usdBdv) + ' $';
        document.getElementById('resWally').innerText = format(wallyUsd) + ' $';
        document.getElementById('resBinance').innerText = format(binanceUsdt, 4) + ' USDT';
        document.getElementById('resNeto').innerText = format(netoBs) + ' Bs';
        document.getElementById('resPorcentaje').innerText = (netoBs > 0 ? '+' : '') + format(porcentaje) + '%';

        // Colores de rentabilidad
        const caja = document.getElementById('cajaNeto');
        if (mBs > 0) {
            if (netoBs > 0) { caja.className = 'summary profit'; document.getElementById('labelNeto').innerText = 'Ganancia Neta'; }
            else { caja.className = 'summary loss'; document.getElementById('labelNeto').innerText = 'Pérdida Neta'; }
        } else {
            caja.className = 'summary';
        }
    }

    // Ejecutar al cargar
    calcular();
</script>

</body>
</html>
