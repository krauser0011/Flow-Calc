<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Arbitraje Unificada</title>
    <style>
        :root {
            --bg: #f4f7f9;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --accent: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --input-bg: #f8fafc;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            background-color: var(--card);
            width: 100%;
            max-width: 480px;
            border-radius: 28px;
            padding: 30px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; }

        .theme-toggle {
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-main);
        }

        /* Sección de Entradas */
        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-box {
            background: var(--input-bg);
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .input-box label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .input-box input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: 600;
        }

        .full-width { grid-column: span 2; border: 2px solid var(--accent); }

        /* Flujo de Resultados */
        .flow {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .step {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: var(--input-bg);
            border-radius: 16px;
            border-left: 4px solid var(--accent);
        }

        .step-info span { display: block; }
        .label { font-size: 0.75rem; color: var(--text-sub); font-weight: 600; }
        .val { font-size: 1.05rem; font-weight: 700; }

        /* Resultado Final */
        .summary {
            padding: 24px;
            border-radius: 20px;
            text-align: center;
            background: var(--accent);
            color: white;
            margin-top: 10px;
        }

        .summary.profit { background: var(--success); }
        .summary.loss { background: var(--danger); }

        .summary-label { font-size: 0.85rem; font-weight: 600; opacity: 0.9; }
        .summary-val { font-size: 2.2rem; font-weight: 800; margin: 5px 0; }
        .summary-pct { font-size: 1rem; font-weight: 700; background: rgba(0,0,0,0.15); padding: 4px 15px; border-radius: 50px; display: inline-block; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Arbitraje <span style="color:var(--accent)">Full-Flow</span></h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="tBtn">🌙</button>
    </div>

    <div class="grid-inputs">
        <div class="input-box">
            <label>Tasa Compra BDV</label>
            <input type="number" id="tasaBdv" placeholder="0.00" step="0.01">
        </div>
        <div class="input-box">
            <label>Tasa Venta P2P</label>
            <input type="number" id="tasaP2p" placeholder="0.00" step="0.01">
        </div>
        <div class="input-box full-width">
            <label>Inversión Base (Bolívares)</label>
            <input type="number" id="montoBs" placeholder="¿Cuánto vas a usar?" step="0.01">
        </div>
    </div>

    <div class="flow">
        <div class="step">
            <div class="step-info">
                <span class="label">1. USD en Cuenta Bancaria</span>
                <span class="val" id="resUsdBdv">0.00 $</span>
            </div>
        </div>

        <div class="step" style="border-left-color: #8b5cf6;">
            <div class="step-info">
                <span class="label">2. Saldo Neto en Wally</span>
                <span class="val" id="resWally">0.00 $</span>
            </div>
            <span style="font-size: 0.7rem; color: var(--text-sub);">-6.25%</span>
        </div>

        <div class="step" style="border-left-color: #f59e0b;">
            <div class="step-info">
                <span class="label">3. USDT en Binance</span>
                <span class="val" id="resBinance">0.0000 USDT</span>
            </div>
        </div>
    </div>

    <div class="summary" id="cajaNeto">
        <div class="summary-label" id="labelNeto">Ganancia Estimada</div>
        <div class="summary-val" id="resNeto">0.00 Bs</div>
        <div class="summary-pct" id="resPorcentaje">0.00%</div>
    </div>
</div>

<script>
    const ids = ['tasaBdv', 'tasaP2p', 'montoBs'];
    
    // Al cargar: recuperar datos y aplicar tema
    window.onload = () => {
        ids.forEach(id => {
            const val = localStorage.getItem(id);
            if(val) document.getElementById(id).value = val;
            document.getElementById(id).addEventListener('input', calcular);
        });
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) toggleTheme();
        calcular();
    };

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('tBtn');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            btn.innerText = '🌙';
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = '☀️';
        }
    }

    function fmt(n, d = 2) {
        return n.toLocaleString('en-US', {minimumFractionDigits: d, maximumFractionDigits: d});
    }

    function calcular() {
        const tBdv = parseFloat(document.getElementById('tasaBdv').value) || 0;
        const tP2p = parseFloat(document.getElementById('tasaP2p').value) || 0;
        const mBs = parseFloat(document.getElementById('montoBs').value) || 0;

        // Persistencia
        ids.forEach(id => localStorage.setItem(id, document.getElementById(id).value));

        // Constantes del proceso
        const COMISION_BANCO = 0.0625; // 6.25%
        const FACTOR_BINANCE = 0.935031;

        // Lógica de Flujo
        // 1. Dólares que el banco te otorga por esos Bs
        const usdBanco = tBdv > 0 ? mBs / tBdv : 0;

        // 2. Dólares que realmente caen en Wally (descontando la comisión que el banco suma al precio)
        const usdWally = usdBanco / (1 + COMISION_BANCO);

        // 3. USDT que recibes tras el cambio interno
        const usdtBinance = usdWally * FACTOR_BINANCE;

        // 4. Retorno final en Bs al vender en P2P
        const retornoBs = usdtBinance * tP2p;
        const netoBs = retornoBs - mBs;
        const pct = mBs > 0 ? (netoBs / mBs) * 100 : 0;

        // Actualizar Interfaz
        document.getElementById('resUsdBdv').innerText = fmt(usdBanco) + ' $';
        document.getElementById('resWally').innerText = fmt(usdWally) + ' $';
        document.getElementById('resBinance').innerText = fmt(usdtBinance, 4) + ' USDT';
        document.getElementById('resNeto').innerText = (netoBs >= 0 ? '+ ' : '') + fmt(netoBs) + ' Bs';
        document.getElementById('resPorcentaje').innerText = (netoBs >= 0 ? '+' : '') + fmt(pct) + '%';

        const caja = document.getElementById('cajaNeto');
        const label = document.getElementById('labelNeto');
        
        caja.className = 'summary';
        if (mBs > 0) {
            if (netoBs > 0) {
                caja.classList.add('profit');
                label.innerText = 'Ganancia Neta';
            } else {
                caja.classList.add('loss');
                label.innerText = 'Pérdida Neta';
            }
        }
    }
</script>

</body>
</html>
