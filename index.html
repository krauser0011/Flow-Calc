<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitraje BDV > Wally > Binance</title>
    <style>
        :root {
            /* Light Theme Variables */
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --primary: #0056b3;
            --primary-hover: #004494;
            --accent-wally: #00D1A1;
            --accent-binance: #F3BA2F;
            --border-color: #e4e6eb;
            --success: #10b981;
            --danger: #ef4444;
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
            --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            /* Dark Theme Variables */
            --bg-color: #18191a;
            --card-bg: #242526;
            --text-main: #e4e6eb;
            --text-muted: #b0b3b8;
            --primary: #2d88ff;
            --primary-hover: #1b74e4;
            --border-color: #3e4042;
            --shadow: 0 10px 25px rgba(0,0,0,0.5);
            --input-bg: #3a3b3c;
        }

        * {
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }

        .header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
        }

        .content {
            padding: 24px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .tab.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-row {
            display: flex;
            gap: 16px;
        }

        .input-row .input-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(45, 136, 255, 0.2);
        }

        button.btn-calc {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        button.btn-calc:hover {
            background-color: var(--primary-hover);
        }

        .results-container {
            margin-top: 24px;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .result-header {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .result-value {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .accent-bdv { color: var(--primary); }
        .accent-wally { color: var(--accent-wally); }
        .accent-binance { color: var(--accent-binance); }

        .summary-box {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            text-align: center;
        }

        .summary-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .profit { color: var(--success); }
        .loss { color: var(--danger); }
        
        .net-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Calculadora de Retorno</h2>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌙</button>
        </div>

        <div class="content">
            <div class="input-row">
                <div class="input-group">
                    <label>Tasa BDV (VES/USD)</label>
                    <input type="number" id="tasaBdv" placeholder="Ej: 36.50" step="0.01">
                </div>
                <div class="input-group">
                    <label>Tasa P2P Binance (VES/USDT)</label>
                    <input type="number" id="tasaP2p" placeholder="Ej: 38.20" step="0.01">
                </div>
            </div>

            <div class="tabs">
                <div class="tab active" id="tabWally" onclick="setMode('wally')">Tengo en Wally ($)</div>
                <div class="tab" id="tabBinance" onclick="setMode('binance')">Quiero en Binance (USDT)</div>
            </div>

            <div class="input-group">
                <label id="labelMonto">Monto a recargar en Wally:</label>
                <input type="number" id="montoPrincipal" placeholder="0.00" step="0.01">
            </div>

            <button class="btn-calc" onclick="calcular()">Calcular Operación</button>

            <div class="results-container" id="resultados">
                
                <div class="result-card">
                    <div class="result-header">
                        <span>1. Inversión Inicial (BDV)</span>
                        <span id="resBdvUsd">0.00 USD</span>
                    </div>
                    <div class="result-value accent-bdv" id="resBdvVes">0.00 Bs</div>
                    <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">Incluye comisión 6.25%</div>
                </div>

                <div class="result-card">
                    <div class="result-header">
                        <span>2. Tránsito (Wally)</span>
                    </div>
                    <div class="result-value accent-wally" id="resWally">0.00 $</div>
                </div>

                <div class="result-card">
                    <div class="result-header">
                        <span>3. Recibido (Binance)</span>
                    </div>
                    <div class="result-value accent-binance" id="resBinance">0.00 USDT</div>
                </div>

                <div class="summary-box">
                    <div class="summary-title">Retorno P2P Estimado</div>
                    <div class="result-value" id="resRetornoVes" style="margin-bottom: 10px;">0.00 Bs</div>
                    
                    <div class="summary-title">Ganancia / Pérdida Neta</div>
                    <div class="net-value" id="resNeto">0.00 Bs</div>
                    <div id="resPorcentaje" style="font-size: 0.85rem; margin-top: 4px; font-weight: 500;">0.00%</div>
                </div>

            </div>
        </div>
    </div>

    <script>
        let calcMode = 'wally'; // 'wally' o 'binance'

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                icon.innerText = '🌙';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.innerText = '☀️';
            }
        }

        function setMode(mode) {
            calcMode = mode;
            document.getElementById('tabWally').classList.remove('active');
            document.getElementById('tabBinance').classList.remove('active');
            
            if (mode === 'wally') {
                document.getElementById('tabWally').classList.add('active');
                document.getElementById('labelMonto').innerText = 'Monto a recargar en Wally ($):';
            } else {
                document.getElementById('tabBinance').classList.add('active');
                document.getElementById('labelMonto').innerText = 'USDT que necesitas recibir en Binance:';
            }
        }

        function calcular() {
            const tasaBdv = parseFloat(document.getElementById('tasaBdv').value);
            const tasaP2p = parseFloat(document.getElementById('tasaP2p').value);
            const monto = parseFloat(document.getElementById('montoPrincipal').value);

            if (isNaN(tasaBdv) || isNaN(tasaP2p) || isNaN(monto) || tasaBdv <= 0 || tasaP2p <= 0 || monto <= 0) {
                alert("Por favor, completa todos los campos con valores mayores a cero.");
                return;
            }

            const COMISION_BDV = 0.0625;
            const FACTOR_BINANCE = 0.935031;

            let wallyUsd = 0;
            let binanceUsdt = 0;

            // Lógica dependiendo del modo seleccionado
            if (calcMode === 'wally') {
                wallyUsd = monto;
                binanceUsdt = wallyUsd * FACTOR_BINANCE;
            } else {
                binanceUsdt = monto;
                wallyUsd = binanceUsdt / FACTOR_BINANCE;
            }

            // Cálculos generales
            const bdvUsd = wallyUsd * (1 + COMISION_BDV);
            const inversionVes = bdvUsd * tasaBdv;
            const retornoVes = binanceUsdt * tasaP2p;
            
            const gananciaNeta = retornoVes - inversionVes;
            const porcentajeRendimiento = (gananciaNeta / inversionVes) * 100;

            // Actualizar la UI
            document.getElementById('resBdvUsd').innerText = bdvUsd.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' USD';
            document.getElementById('resBdvVes').innerText = inversionVes.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' Bs';
            
            document.getElementById('resWally').innerText = wallyUsd.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' $';
            document.getElementById('resBinance').innerText = binanceUsdt.toLocaleString('en-US', {minimumFractionDigits: 4, maximumFractionDigits: 4}) + ' USDT';
            
            document.getElementById('resRetornoVes').innerText = retornoVes.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' Bs';

            // Lógica de colores para Ganancia/Pérdida
            const netElement = document.getElementById('resNeto');
            const percentElement = document.getElementById('resPorcentaje');
            
            netElement.innerText = (gananciaNeta > 0 ? '+' : '') + gananciaNeta.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' Bs';
            percentElement.innerText = (porcentajeRendimiento > 0 ? '+' : '') + porcentajeRendimiento.toFixed(2) + '%';

            if (gananciaNeta >= 0) {
                netElement.className = 'net-value profit';
                percentElement.className = 'profit';
            } else {
                netElement.className = 'net-value loss';
                percentElement.className = 'loss';
            }

            document.getElementById('resultados').style.display = 'block';
        }

        // Detectar preferencia del sistema para el modo oscuro por defecto (Opcional)
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            toggleTheme();
        }
    </script>
</body>
</html>
