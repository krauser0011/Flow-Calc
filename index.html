<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Arbitraje Total</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --input-focus: #dbeafe;
        }

        [data-theme="dark"] {
            --bg: #020617;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-sub: #94a3b8;
            --border: #334155;
            --input-focus: #1e3a8a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .main-container {
            background-color: var(--card);
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; color: var(--primary); }

        .rates-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px dashed var(--border);
        }

        .input-group {
            background: var(--bg);
            padding: 10px 14px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .input-group label {
            display: block;
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--text-sub);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 1.1rem;
            font-weight: 700;
        }

        .flow-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-sub);
            margin-bottom: 12px;
            text-align: center;
        }

        .step-card {
            position: relative;
            background: var(--bg);
            margin-bottom: 10px;
            padding: 14px;
            border-radius: 18px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .step-card:focus-within {
            border-color: var(--primary);
            background: var(--input-focus);
            transform: scale(1.02);
        }

        .step-card label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-sub);
        }

        .step-card input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
            margin-top: 2px;
        }

        .badge {
            position: absolute;
            right: 14px;
            top: 14px;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 8px;
            background: var(--border);
            font-weight: 700;
        }

        .result-box {
            margin-top: 15px;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            background: var(--primary);
            color: white;
        }

        .profit { background: var(--success); }
        .loss { background: var(--danger); }

        .result-val { font-size: 1.8rem; font-weight: 900; }
        .result-pct { font-size: 0.9rem; font-weight: 700; opacity: 0.9; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <h1>Arbitraje Interconectado</h1>
        <button onclick="document.body.getAttribute('data-theme')=='dark'?document.body.removeAttribute('data-theme'):document.body.setAttribute('data-theme','dark')" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌓</button>
    </div>

    <div class="rates-grid">
        <div class="input-group">
            <label>BCV / Tasa Banco</label>
            <input type="number" id="tasaBdv" placeholder="0.00" oninput="recalc('ves')">
        </div>
        <div class="input-group">
            <label>Tasa P2P Binance</label>
            <input type="number" id="tasaP2p" placeholder="0.00" oninput="recalc('ves')">
        </div>
    </div>

    <p class="flow-title">FLUJO DE DINERO (EDITA CUALQUIER CAMPO)</p>

    <div class="step-card" style="border-left: 5px solid var(--text-sub);">
        <label>Base Bolívares (VES)</label>
        <input type="number" id="valVes" placeholder="0.00" oninput="recalc('ves')">
        <span class="badge">INVERSIÓN</span>
    </div>

    <div class="step-card" style="border-left: 5px solid var(--primary);">
        <label>USD en Cuenta (Gross)</label>
        <input type="number" id="valBank" placeholder="0.00" oninput="recalc('bank')">
        <span class="badge">BANCO</span>
    </div>

    <div class="step-card" style="border-left: 5px solid #8b5cf6;">
        <label>Saldo Wally (Neto)</label>
        <input type="number" id="valWally" placeholder="0.00" oninput="recalc('wally')">
        <span class="badge" style="color:#8b5cf6">WALLY</span>
    </div>

    <div class="step-card" style="border-left: 5px solid #f59e0b;">
        <label>USDT en Binance</label>
        <input type="number" id="valBinance" placeholder="0.0000" oninput="recalc('binance')">
        <span class="badge" style="color:#f59e0b">BINANCE</span>
    </div>

    <div class="result-box" id="cajaResultado">
        <div style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase;">Retorno Neto Estimado</div>
        <div class="result-val" id="resGanancia">0.00 Bs</div>
        <div class="result-pct" id="resPct">0.00%</div>
    </div>
</div>

<script>
    const COMISION_BANCO = 0.0625; // 6.25%
    const FACTOR_WALLY_BINANCE = 0.935031;

    // Cargar tasas al inicio
    window.onload = () => {
        if(localStorage.getItem('tBdv')) document.getElementById('tasaBdv').value = localStorage.getItem('tBdv');
        if(localStorage.getItem('tP2p')) document.getElementById('tasaP2p').value = localStorage.getItem('tP2p');
    };

    function recalc(source) {
        const tBdv = parseFloat(document.getElementById('tasaBdv').value) || 0;
        const tP2p = parseFloat(document.getElementById('tasaP2p').value) || 0;
        
        // Guardar tasas
        localStorage.setItem('tBdv', tBdv);
        localStorage.setItem('tP2p', tP2p);

        let ves = 0, bank = 0, wally = 0, binance = 0;

        if (source === 'ves') {
            ves = parseFloat(document.getElementById('valVes').value) || 0;
            bank = tBdv > 0 ? ves / tBdv : 0;
            wally = bank / (1 + COMISION_BANCO);
            binance = wally * FACTOR_WALLY_BINANCE;
        } 
        else if (source === 'bank') {
            bank = parseFloat(document.getElementById('valBank').value) || 0;
            ves = bank * tBdv;
            wally = bank / (1 + COMISION_BANCO);
            binance = wally * FACTOR_WALLY_BINANCE;
        } 
        else if (source === 'wally') {
            wally = parseFloat(document.getElementById('valWally').value) || 0;
            bank = wally * (1 + COMISION_BANCO);
            ves = bank * tBdv;
            binance = wally * FACTOR_WALLY_BINANCE;
        } 
        else if (source === 'binance') {
            binance = parseFloat(document.getElementById('valBinance').value) || 0;
            wally = binance / FACTOR_WALLY_BINANCE;
            bank = wally * (1 + COMISION_BANCO);
            ves = bank * tBdv;
        }

        // Actualizar campos (excepto el que se está escribiendo)
        if (source !== 'ves') document.getElementById('valVes').value = ves.toFixed(2);
        if (source !== 'bank') document.getElementById('valBank').value = bank.toFixed(2);
        if (source !== 'wally') document.getElementById('valWally').value = wally.toFixed(2);
        if (source !== 'binance') document.getElementById('valBinance').value = binance.toFixed(4);

        // Cálculo de Ganancia
        const retornoBs = binance * tP2p;
        const ganancia = retornoBs - ves;
        const pct = ves > 0 ? (ganancia / ves) * 100 : 0;

        // UI de Ganancia
        document.getElementById('resGanancia').innerText = (ganancia >= 0 ? '+ ' : '') + ganancia.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' Bs';
        document.getElementById('resPct').innerText = (ganancia >= 0 ? '+' : '') + pct.toFixed(2) + '%';
        
        const caja = document.getElementById('cajaResultado');
        caja.className = 'result-box ' + (ves <= 0 ? '' : (ganancia >= 0 ? 'profit' : 'loss'));
    }
</script>

</body>
</html>
