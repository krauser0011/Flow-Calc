<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbitraje | BDV - Wally - Binance</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --accent: #2563eb;
            --success: #059669;
            --danger: #dc2626;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --transition: all 0.2s ease;
        }

        [data-theme="dark"] {
            --bg: #111827;
            --surface: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border: #374151;
            --accent: #3b82f6;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background-color: var(--surface);
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            padding: 32px;
            border: 1px solid var(--border);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .theme-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.25rem;
            padding: 8px;
            border-radius: 50%;
        }

        .theme-btn:hover {
            background-color: var(--border);
            color: var(--text-primary);
        }

        .mode-toggle {
            display: flex;
            background-color: var(--bg);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .mode-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .mode-btn.active {
            background-color: var(--surface);
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-row {
            display: flex;
            gap: 16px;
        }

        .input-row .input-group {
            flex: 1;
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            background-color: transparent;
            border: none;
            border-bottom: 2px solid var(--border);
            color: var(--text-primary);
            font-size: 1.5rem;
            padding: 8px 0;
            font-weight: 500;
            outline: none;
        }

        input:focus {
            border-bottom-color: var(--accent);
        }

        input::placeholder {
            color: var(--border);
        }

        .results {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .result-value {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .total-box {
            margin-top: 8px;
            padding: 16px;
            background-color: var(--bg);
            border-radius: 12px;
            text-align: right;
            border: 1px solid var(--border);
        }

        .total-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .total-value {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .profit { color: var(--success); }
        .loss { color: var(--danger); }
        
        .percentage {
            font-size: 0.875rem;
            font-weight: 500;
            margin-top: 4px;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>Arbitraje Electrónico</h1>
            <button class="theme-btn" onclick="toggleTheme()" id="themeIcon">☀️</button>
        </div>

        <div class="mode-toggle">
            <button class="mode-btn active" id="btnWally" onclick="setMode('wally')">Base: Wally ($)</button>
            <button class="mode-btn" id="btnBinance" onclick="setMode('binance')">Base: Binance (USDT)</button>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label>Tasa BDV</label>
                <input type="number" id="tasaBdv" placeholder="0.00" step="0.01">
            </div>
            <div class="input-group">
                <label>Tasa P2P</label>
                <input type="number" id="tasaP2p" placeholder="0.00" step="0.01">
            </div>
        </div>

        <div class="input-group" style="margin-top: 8px;">
            <label id="labelMonto">Monto a operar</label>
            <input type="number" id="montoPrincipal" placeholder="0.00" step="0.01">
        </div>

        <div class="results">
            <div class="result-row">
                <span class="result-label">Inversión (BDV)</span>
                <span class="result-value" id="resBdv">0.00 Bs</span>
            </div>
            <div class="result-row">
                <span class="result-label">Llega a Wally</span>
                <span class="result-value" id="resWally">0.00 $</span>
            </div>
            <div class="result-row">
                <span class="result-label">Recibes en Binance</span>
                <span class="result-value" id="resBinance">0.00 USDT</span>
            </div>
            <div class="result-row">
                <span class="result-label">Venta P2P Estimada</span>
                <span class="result-value" id="resRetorno">0.00 Bs</span>
            </div>

            <div class="total-box">
                <div class="total-label">Resultado Neto</div>
                <div class="total-value" id="resNeto">0.00 Bs</div>
                <div class="percentage" id="resPorcentaje">0.00%</div>
            </div>
        </div>
    </div>

    <script>
        let calcMode = 'wally';

        // Configurar modo oscuro por defecto basado en el sistema
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.setAttribute('data-theme', 'dark');
            document.getElementById('themeIcon').innerText = '☀️';
        } else {
            document.getElementById('themeIcon').innerText = '🌙';
        }

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                icon.innerText = '🌙';
            } else {
                body.setAttribute('data-theme', 'dark');
                icon.innerText = '☀️';
            }
        }

        function setMode(mode) {
            calcMode = mode;
            document.getElementById('btnWally').classList.remove('active');
            document.getElementById('btnBinance').classList.remove('active');
            
            if (mode === 'wally') {
                document.getElementById('btnWally').classList.add('active');
                document.getElementById('labelMonto').innerText = 'Monto a recargar en Wally ($)';
            } else {
                document.getElementById('btnBinance').classList.add('active');
                document.getElementById('labelMonto').innerText = 'USDT deseados en Binance';
            }
            calcular(); // Recalcular inmediatamente al cambiar de modo
        }

        function formatNumber(num, decimals = 2) {
            // Usamos en-US para forzar el punto como separador decimal
            if (isNaN(num) || !isFinite(num)) return (0).toLocaleString('en-US', {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
            return num.toLocaleString('en-US', {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
        }

        function calcular() {
            const tasaBdv = parseFloat(document.getElementById('tasaBdv').value) || 0;
            const tasaP2p = parseFloat(document.getElementById('tasaP2p').value) || 0;
            const monto = parseFloat(document.getElementById('montoPrincipal').value) || 0;

            const COMISION_BDV = 0.0625;
            const FACTOR_BINANCE = 0.935031;

            let wallyUsd = 0;
            let binanceUsdt = 0;

            if (monto > 0) {
                if (calcMode === 'wally') {
                    wallyUsd = monto;
                    binanceUsdt = wallyUsd * FACTOR_BINANCE;
                } else {
                    binanceUsdt = monto;
                    wallyUsd = binanceUsdt / FACTOR_BINANCE;
                }
            }

            const bdvUsd = wallyUsd * (1 + COMISION_BDV);
            const inversionVes = bdvUsd * tasaBdv;
            const retornoVes = binanceUsdt * tasaP2p;
            
            const gananciaNeta = retornoVes - inversionVes;
            const porcentajeRendimiento = inversionVes > 0 ? (gananciaNeta / inversionVes) * 100 : 0;

            // Actualizar la interfaz con el formato de punto decimal
            document.getElementById('resBdv').innerText = formatNumber(inversionVes) + ' Bs';
            document.getElementById('resWally').innerText = formatNumber(wallyUsd) + ' $';
            document.getElementById('resBinance').innerText = formatNumber(binanceUsdt, 4) + ' USDT';
            document.getElementById('resRetorno').innerText = formatNumber(retornoVes) + ' Bs';

            const netElement = document.getElementById('resNeto');
            const percentElement = document.getElementById('resPorcentaje');
            
            let prefix = gananciaNeta > 0 ? '+' : '';
            netElement.innerText = prefix + formatNumber(gananciaNeta) + ' Bs';
            percentElement.innerText = prefix + formatNumber(porcentajeRendimiento) + '%';

            // Colores dinámicos
            netElement.className = 'total-value';
            percentElement.className = 'percentage';
            
            if (monto > 0 && tasaBdv > 0 && tasaP2p > 0) {
                if (gananciaNeta > 0) {
                    netElement.classList.add('profit');
                    percentElement.classList.add('profit');
                } else if (gananciaNeta < 0) {
                    netElement.classList.add('loss');
                    percentElement.classList.add('loss');
                }
            }
        }

        // Agregar Event Listeners para cálculo en tiempo real
        document.getElementById('tasaBdv').addEventListener('input', calcular);
        document.getElementById('tasaP2p').addEventListener('input', calcular);
        document.getElementById('montoPrincipal').addEventListener('input', calcular);
        
        // Ejecutar cálculo inicial para que todo esté en 0.00
        calcular();
    </script>
</body>
</html>
