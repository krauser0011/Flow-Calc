<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlowCalc 4.8 | Comisiones en $</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg-body: #f1f5f9; --bg-card: #ffffff; --text-main: #0f172a;
            --accent-bdv: #ef4444; --accent-wally: #6366f1; --accent-zinli: #00d1b2;
            --accent-binance: #f59e0b; --accent-retorno: #10b981; --border: #e2e8f0;
        }
        [data-bs-theme="dark"] {
            --bg-body: #020617; --bg-card: #1e293b; --text-main: #f1f5f9; --border: #334155;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; padding: 15px 0; }
        .card { border-radius: 18px; border: 1px solid var(--border); background: var(--bg-card); }
        .header-section { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .form-control { background-color: rgba(0,0,0,0.02); border: 2px solid var(--border); color: var(--text-main); border-radius: 12px; font-weight: 700; font-family: 'JetBrains+Mono', monospace; text-align: center; }
        .semaforo { height: 8px; border-radius: 10px; margin-bottom: 15px; background: #cbd5e1; }
        .semaforo-verde { background: #10b981; }
        .semaforo-amarillo { background: #f59e0b; }
        .semaforo-rojo { background: #ef4444; }
        .theme-toggle { position: fixed; top: 15px; right: 15px; cursor: pointer; padding: 10px; border-radius: 50%; background: var(--bg-card); z-index: 1000; border: 1px solid var(--border); }
    </style>
</head>
<body data-bs-theme="light">

<div class="theme-toggle" onclick="toggleTheme()">🌓</div>

<div class="container">
    <div class="header-section shadow-lg">
        <div class="row align-items-center">
            <div class="col-7">
                <h2 class="fw-bold mb-0">📊 FlowCalc <span style="color: #38bdf8;">4.8</span></h2>
                <small class="opacity-75">Cálculo de Comisiones en $</small>
            </div>
            <div class="col-5 text-end">
                <small class="d-block opacity-50">GANANCIA HOY</small>
                <h4 class="fw-bold mb-0 text-success" id="ganancia_total_dia">0.00 Bs</h4>
            </div>
        </div>
    </div>

    <div class="row g-2">
        <div class="col-12 col-md-4">
            <div class="card h-100 shadow-sm" style="border-left: 5px solid var(--accent-bdv);">
                <div class="card-body py-2 text-center">
                    <label class="small fw-bold">Tasa BCV</label>
                    <input type="number" id="tasa_bcv" class="form-control mb-2" value="51.50" oninput="calcular('bcv')">
                    <label class="small fw-bold">Débito Total Banco ($)</label>
                    <input type="number" id="bdv_usd" class="form-control" value="225.00" oninput="calcular('bdv')">
                </div>
            </div>
        </div>

        <div class="col-6 col-md-4">
            <div class="card h-100 shadow-sm" style="border-left: 5px solid var(--accent-wally);">
                <div class="card-body py-2 text-center">
                    <label class="small fw-bold d-block">Neto Wally ($)</label>
                    <input type="number" id="wally_usd" class="form-control mb-1" oninput="calcular('wally')">
                    <span class="badge bg-primary-subtle text-primary border" id="wally_fee_text">Fee: $0.00</span>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-4">
            <div class="card h-100 shadow-sm" style="border-left: 5px solid var(--accent-zinli);">
                <div class="card-body py-2 text-center">
                    <label class="small fw-bold d-block">Neto Zinli ($)</label>
                    <input type="number" id="zinli_usd" class="form-control mb-1" oninput="calcular('zinli')">
                    <span class="badge bg-danger-subtle text-danger border">Zinli Fee: $<span id="zinli_fee_display">0.00</span></span>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-2 mt-1">
        <div class="col-12 col-md-6">
            <div class="card shadow-sm" style="border-left: 5px solid var(--accent-binance);">
                <div class="card-body py-2">
                    <div class="row align-items-center">
                        <div class="col-6 small fw-bold">USDT Binance</div>
                        <div class="col-6"><input type="number" id="binance_usdt" class="form-control" oninput="calcular('binance')"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6">
            <div class="card shadow-sm" style="border-left: 5px solid var(--accent-retorno);">
                <div class="card-body py-2">
                    <div class="row align-items-center">
                        <div class="col-6 small fw-bold">Tasa Venta P2P</div>
                        <div class="col-6"><input type="number" id="tasa_p2p" class="form-control" value="62.50" oninput="calcular('p2p')"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-3 shadow-lg p-3">
        <div id="status_light" class="semaforo"></div>
        <div class="row text-center align-items-center">
            <div class="col-4">
                <small class="text-muted d-block small fw-bold">GANANCIA</small>
                <h4 class="fw-bold mb-0" id="res_ganancia">0 Bs</h4>
            </div>
            <div class="col-4 border-start border-end">
                <small class="text-muted d-block small fw-bold">ROI</small>
                <h5 class="fw-bold mb-0" id="res_porcentaje">0%</h5>
            </div>
            <div class="col-4">
                <button class="btn btn-dark w-100" style="padding: 15px; font-weight: 800; border-radius: 12px;" onclick="guardarOperacion()">💾 OK</button>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <div class="card shadow-sm overflow-hidden">
            <div class="table-responsive">
                <table class="table table-sm mb-0 text-center" style="font-size: 0.8rem;">
                    <thead class="table-dark">
                        <tr><th>Hora</th><th>Débito Bs</th><th>USDT</th><th>Ganancia</th><th>%</th></tr>
                    </thead>
                    <tbody id="lista_historial"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const FEE_ZINLI_PCT = 0.036133; // Ajustado para que 225 dé 216.87
    const FEE_WALLY_PCT = 0.025;   // Ajustable según cobro real de Wally

    let operaciones = JSON.parse(localStorage.getItem('ops_flowcalc_v4')) || [];

    function toggleTheme() {
        const current = document.body.getAttribute('data-bs-theme');
        document.body.setAttribute('data-bs-theme', current === 'dark' ? 'light' : 'dark');
    }

    function calcular(origen) {
        let bcv = parseFloat(document.getElementById('tasa_bcv').value) || 0;
        let p2p = parseFloat(document.getElementById('tasa_p2p').value) || 0;
        let bdv_usd = parseFloat(document.getElementById('bdv_usd').value) || 0;
        let wally_usd = parseFloat(document.getElementById('wally_usd').value) || 0;
        let zinli_usd = parseFloat(document.getElementById('zinli_usd').value) || 0;
        let binance_usdt = parseFloat(document.getElementById('binance_usdt').value) || 0;

        if (origen === 'bdv' || origen === 'bcv') {
            zinli_usd = bdv_usd * (1 - FEE_ZINLI_PCT);
            wally_usd = bdv_usd * (1 - FEE_WALLY_PCT);
            binance_usdt = zinli_usd * 0.985; // Estimado de salida
        } else if (origen === 'zinli') {
            bdv_usd = zinli_usd / (1 - FEE_ZINLI_PCT);
            wally_usd = bdv_usd * (1 - FEE_WALLY_PCT);
            binance_usdt = zinli_usd * 0.985;
        } else if (origen === 'binance') {
            zinli_usd = binance_usdt / 0.985;
            bdv_usd = zinli_usd / (1 - FEE_ZINLI_PCT);
            wally_usd = bdv_usd * (1 - FEE_WALLY_PCT);
        }

        if(origen !== 'bdv') document.getElementById('bdv_usd').value = bdv_usd.toFixed(2);
        if(origen !== 'wally') document.getElementById('wally_usd').value = wally_usd.toFixed(2);
        if(origen !== 'zinli') document.getElementById('zinli_usd').value = zinli_usd.toFixed(2);
        if(origen !== 'binance') document.getElementById('binance_usdt').value = binance_usdt.toFixed(4);

        document.getElementById('zinli_fee_display').innerText = (bdv_usd - zinli_usd).toFixed(2);
        document.getElementById('wally_fee_text').innerText = "Fee: $" + (bdv_usd - wally_usd).toFixed(2);

        let total_inv_bs = bdv_usd * bcv;
        let total_ret_bs = binance_usdt * p2p;
        let ganancia = total_ret_bs - total_inv_bs;
        let roi = total_inv_bs > 0 ? (ganancia / total_inv_bs) * 100 : 0;

        document.getElementById('res_ganancia').innerText = Math.floor(ganancia).toLocaleString('es-VE') + " Bs";
        document.getElementById('res_ganancia').style.color = ganancia >= 0 ? "#10b981" : "#ef4444";
        document.getElementById('res_porcentaje').innerText = roi.toFixed(2) + "%";

        const light = document.getElementById('status_light');
        light.className = "semaforo " + (roi >= 1.5 ? "semaforo-verde" : (roi >= 0.5 ? "semaforo-amarillo" : "semaforo-rojo"));
    }

    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('focus', (e) => e.target.select());
    });

    function guardarOperacion() {
        let bdv = parseFloat(document.getElementById('bdv_usd').value);
        let bcv = parseFloat(document.getElementById('tasa_bcv').value);
        let inv = bdv * bcv;
        let usdt = document.getElementById('binance_usdt').value;
        let p2p = document.getElementById('tasa_p2p').value;
        let gan = (usdt * p2p) - inv;

        operaciones.unshift({
            Hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            Inv: Math.floor(inv),
            Usdt: usdt,
            Gan: Math.floor(gan),
            Roi: ((gan/inv)*100).toFixed(2) + "%"
        });
        localStorage.setItem('ops_flowcalc_v4', JSON.stringify(operaciones));
        actualizarTabla();
    }

    function actualizarTabla() {
        const lista = document.getElementById('lista_historial');
        lista.innerHTML = '';
        let total = 0;
        operaciones.forEach(op => {
            total += parseFloat(op.Gan);
            lista.innerHTML += `<tr><td>${op.Hora}</td><td>${op.Inv.toLocaleString('es-VE')}</td><td>${op.Usdt}</td><td class="fw-bold ${op.Gan>=0?'text-success':'text-danger'}">${op.Gan.toLocaleString('es-VE')}</td><td>${op.Roi}</td></tr>`;
        });
        document.getElementById('ganancia_total_dia').innerText = Math.floor(total).toLocaleString('es-VE') + " Bs";
    }

    function limpiarHistorial() { if(confirm("¿Borrar historial?")) { operaciones = []; localStorage.removeItem('ops_flowcalc_v4'); actualizarTabla(); } }

    actualizarTabla();
    calcular('bdv');
</script>
</body>
</html>
